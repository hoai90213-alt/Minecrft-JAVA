name: SwiftUI Development Build

on:
  push:
    paths:
      - "AmethystSwiftUI/**"
      - ".github/workflows/swiftui-development.yml"
  pull_request:
    paths:
      - "AmethystSwiftUI/**"
      - ".github/workflows/swiftui-development.yml"
  workflow_dispatch:

concurrency:
  group: swiftui-development-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-swiftui:
    name: Build AmethystSwiftUI
    runs-on: macos-latest
    defaults:
      run:
        shell: bash
        working-directory: AmethystSwiftUI

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: |
          brew update
          brew install xcodegen

      - name: Generate Xcode project
        run: |
          chmod +x Scripts/generate_project.sh
          ./Scripts/generate_project.sh

      - name: Print project schemes
        run: |
          xcodebuild -list -project AmethystSwiftUI.xcodeproj

      - name: Build iOS Simulator (Debug)
        run: |
          mkdir -p build/logs
          set -o pipefail
          xcodebuild \
            -project AmethystSwiftUI.xcodeproj \
            -target AmethystSwiftUI \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tee build/logs/xcodebuild-sim.log
          BUILD_STATUS=${PIPESTATUS[0]}
          if [ "$BUILD_STATUS" -ne 0 ]; then
            grep -E "error: " build/logs/xcodebuild-sim.log | head -n 80 | while IFS= read -r line; do
              echo "::error::$line"
            done || true
          fi
          exit "$BUILD_STATUS"

      - name: Build iOS Device (Release, unsigned)
        run: |
          xcodebuild \
            -project AmethystSwiftUI.xcodeproj \
            -target AmethystSwiftUI \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build

      - name: Package build outputs
        run: |
          mkdir -p build/artifacts
          SIM_APP="build/DerivedData/Build/Products/Debug-iphonesimulator/AmethystSwiftUI.app"
          DEV_APP="build/DerivedData/Build/Products/Release-iphoneos/AmethystSwiftUI.app"

          if [ -d "$SIM_APP" ]; then
            ditto -c -k --sequesterRsrc --keepParent "$SIM_APP" build/artifacts/AmethystSwiftUI-simulator.app.zip
          fi

          if [ -d "$DEV_APP" ]; then
            ditto -c -k --sequesterRsrc --keepParent "$DEV_APP" build/artifacts/AmethystSwiftUI-device-unsigned.app.zip
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AmethystSwiftUI-build-output
          path: AmethystSwiftUI/build/artifacts/*
          if-no-files-found: error
